# Fly.io config for the GIF Battle realtime server.
# Rename `app` to your unique Fly app before `fly launch --copy-config`.

app = "gif-battle-realtime"
primary_region = "cdg"  # Paris — change to your closest region

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # WebSocket-friendly: long-lived connections; don't aggressively recycle.
  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  timeout = "3s"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Required secrets (set via `fly secrets set …`, do NOT commit):
#   SESSION_SECRET    — same value as the web app's
#   WEB_ORIGIN        — https://gifbattle.fun (your Vercel domain)
#   REDIS_URL         — rediss://default:<token>@<host>:6379 (Upstash)
